name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, format, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Validate registry
        run: pnpm validate-registry

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Cache Storybook build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: packages/registry/node_modules/.cache/storybook
          key: storybook-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/registry/.storybook/**', 'packages/registry/src/**') }}
          restore-keys: |
            storybook-cache-${{ runner.os }}-

      - name: Build Storybook
        run: pnpm --filter @radish-ui/registry storybook:build
