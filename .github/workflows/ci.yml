name: CI

on:
  pull_request:

jobs:
  ci:
    name: Lint, format, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Validate registry
        run: pnpm validate-registry

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Cache Storybook build cache
        uses: actions/cache@v5
        with:
          path: packages/registry/node_modules/.cache/storybook
          key: storybook-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/registry/.storybook/**', 'packages/registry/src/**') }}
          restore-keys: |
            storybook-cache-${{ runner.os }}-

      - name: Build Storybook
        run: pnpm --filter @radish-ui/registry storybook:build
