name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: Lint, format, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Validate registry
        run: pnpm validate-registry

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Cache Storybook build cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: packages/registry/node_modules/.cache/storybook
          key: storybook-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'packages/registry/.storybook/**', 'packages/registry/src/**') }}
          restore-keys: |
            storybook-cache-${{ runner.os }}-

      - name: Build Storybook
        run: pnpm --filter @radish-ui/registry storybook:build
