name: Deploy Docs to Cloudflare Pages

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  deployments: write
  contents: read

# Allow only one concurrent deployment per environment
concurrency:
  group: deploy-docs-${{ github.event_name == 'release' && 'production' || 'next' }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy documentation site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Resolve the target Cloudflare Pages project:
      # - release:published → radish-ui-docs (radish-ui.saebyn.dev)
      # - push:main / workflow_dispatch → radish-ui-docs-next (next.radish-ui.saebyn.dev)
      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "project=radish-ui-docs" >> "$GITHUB_OUTPUT"
            echo "docs_env=production" >> "$GITHUB_OUTPUT"
          else
            echo "project=radish-ui-docs-next" >> "$GITHUB_OUTPUT"
            echo "docs_env=next" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs
        run: pnpm --filter @radish-ui/docs build
        env:
          VITE_DOCS_ENV: ${{ steps.target.outputs.docs_env }}

      - name: Build demo
        run: pnpm --filter @radish-ui/demo build

      - name: Build storybook
        run: pnpm --filter @radish-ui/registry storybook:build

      - name: Copy demo into docs output
        run: |
          mkdir -p apps/docs/.vitepress/dist/demo
          cp -r apps/demo/dist/. apps/docs/.vitepress/dist/demo/

      - name: Copy storybook into docs output
        run: |
          mkdir -p apps/docs/.vitepress/dist/storybook
          cp -r packages/registry/storybook-static/. apps/docs/.vitepress/dist/storybook/

      - name: Create 404 page
        run: |
          cat > apps/docs/.vitepress/dist/404.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Page not found</title>
              <script>
                (function () {
                  var path = window.location.pathname;
                  var demoMarker = '/demo/';
                  var demoIndex = path.indexOf(demoMarker);

                  if (demoIndex !== -1) {
                    var demoPath = path.slice(demoIndex + demoMarker.length - 1);
                    var redirectUrl =
                      demoMarker +
                      '?redirect=' +
                      encodeURIComponent(demoPath + window.location.search + window.location.hash);

                    window.location.replace(redirectUrl);
                  }
                })();
              </script>
            </head>
            <body>
              <h1>404 - Page not found</h1>
              <p>The requested page could not be found.</p>
            </body>
          </html>
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy apps/docs/.vitepress/dist
            --project-name=${{ steps.target.outputs.project }}
            --commit-dirty=true
